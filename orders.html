<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#090b0f"><title>Commandes — Backstage production</title><link rel="stylesheet" href="assets/css/backstage-shell.css?v=20260716-3"><link rel="stylesheet" href="assets/css/users.css?v=20260716-2"><link rel="stylesheet" href="assets/css/orders.css?v=20260716-3"></head><body class="users-page"><main class="users-shell"><header class="users-header"><span class="beta-pill">PRODUCTION · D1</span><h1>Commandes</h1><p>Gestion des commandes, des articles et de la facturation.</p></header>
<p id="connectionStatus" class="status"></p>
<section class="users-panel"><div class="panel-heading"><h2>Commandes production</h2><button id="refreshBtn" class="secondary">Actualiser</button></div><div id="ordersList" class="orders-list"><p class="empty">Chargement…</p></div></section>
<section class="users-panel"><div class="panel-heading"><h2>Articles</h2><button id="newProductBtn" class="secondary" type="button">Nouvel article</button></div><div class="catalog-tabs" role="tablist"><button type="button" data-category-tab="services" class="is-active">Services</button><button type="button" data-category-tab="soins">Soins</button><button type="button" data-category-tab="laverie">Laverie</button></div><p class="drag-help">Sur ordinateur, fais glisser les articles pour modifier leur ordre d’affichage.</p>
<form id="productForm" class="product-form" hidden><input id="productId" type="hidden"><input id="productPosition" type="hidden"><input id="productImage" type="hidden"><div class="field-grid"><label>Page<select id="productCategory"><option value="services">Services</option><option value="soins">Soins</option><option value="laverie">Laverie</option></select></label><label>Nom<input id="productName" maxlength="120" required></label><label>Prix (€)<input id="productPrice" type="number" min="0" max="100000" step="0.01" required></label><label>Badge<input id="productBadge" maxlength="80"></label><label class="wide">Description<textarea id="productDescription" maxlength="1000"></textarea></label><label class="wide image-picker">Image de l’article<input id="productImageFile" type="file" accept="image/*"><span>Galerie ou fichier · compression automatique</span><img id="productImagePreview" alt="Aperçu de l’image" hidden></label><label class="check-row"><input id="productFeatured" type="checkbox"> Mettre en avant 📌</label><label class="check-row"><input id="productActive" type="checkbox" checked> Article actif</label></div><div class="form-actions"><button type="submit">Enregistrer l’article</button><button id="cancelProductBtn" class="secondary" type="button">Annuler</button></div></form><div id="productsList" class="products-admin"><p class="empty">Chargement…</p></div></section>
</main><script src="assets/js/orders.js?v=20260716-4"></script><script src="assets/js/backstage-shell.js?v=20260716-3"></script></body></html>
