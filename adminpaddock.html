<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADMIN CONTROL PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#181E3B">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Montserrat',sans-serif;background:#0f1115;color:white;}
header{display:flex;justify-content:space-between;padding:15px;background:#181E3B;}
.days{display:flex;gap:8px;padding:10px;}
.dayBtn{flex:1;background:#1c1f26;padding:10px;border-radius:10px;text-align:center;}
.dayBtn.active{background:#2e7d32;}
.grid{display:flex;gap:10px;padding:10px;overflow-x:auto;}
.col{min-width:260px;background:#1c1f26;border-radius:16px;padding:10px;}
.slot{padding:8px;border-bottom:1px solid #333;margin-bottom:4px;border-radius:8px;}
.free{color:#2ecc71;}
.reserved{color:#e74c3c;}
.past{opacity:0.4;}
button{background:#e74c3c;border:none;padding:4px 8px;border-radius:6px;color:white;}
.tabs{display:flex;gap:10px;padding:10px;}
.tab{background:#1c1f26;padding:8px;border-radius:10px;}
.tab.active{background:#2e7d32;}
.card{background:#1c1f26;margin:10px;padding:15px;border-radius:16px;}
</style>
</head>

<body>

<header>
<div>ADMIN 🚀</div>
<div>LIVE</div>
</header>

<div class="days" id="days"></div>
<div class="grid" id="grid"></div>

<!-- HORAIRES -->
<div class="tabs">
<div class="tab active" onclick="switchTab('maison',event)">Maison</div>
<div class="tab" onclick="switchTab('grande',event)">Grande</div>
<div class="tab" onclick="switchTab('beudot',event)">Beudot</div>
</div>

<div class="card">
<div id="daysAdmin">Chargement...</div>

<div>
<label><input type="checkbox" id="d60">60</label>
<label><input type="checkbox" id="d90">90</label>
</div>

<button onclick="save()">Sauvegarder</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIza...",
projectId:"ecurie-paddock"
})

const db=firebase.firestore()

let reservations=[]
let horaires={}
let selectedDate=null
let paddockAdmin="maison"

/* LOAD DATA */

db.collection("horaires").onSnapshot(snap=>{
horaires={}
snap.forEach(doc=>{
horaires[doc.id]=doc.data()
})
switchTab(paddockAdmin,{target:document.querySelector(".tab.active")})
})

/* BUILD ADMIN (SAFE) */

const days=["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"]

function build(data){

const container=document.getElementById("daysAdmin")
container.innerHTML=""

/* 🔥 IMPORTANT : on ne met PAS de valeurs par défaut */

days.forEach(day=>{

if(!data || !data[day]){
container.innerHTML+=`<div>${day} (non configuré)</div>`
return
}

let open=data[day].open
let close=data[day].close
let closed=data[day].closed

container.innerHTML+=`

<div class="dayRow">

<div>${day}</div>

<div>
<div class="closed ${closed?'':'off'}" onclick="toggleClosed(this)">
${closed?"Fermé":"Ouvert"}
</div>

<select class="open">${hourOptions()}</select>
<select class="close">${hourOptions()}</select>
</div>

</div>

`

})

/* injecter valeurs exactes */

document.querySelectorAll(".dayRow").forEach((row,i)=>{

if(data && data[days[i]]){

row.querySelector(".open").value=data[days[i]].open
row.querySelector(".close").value=data[days[i]].close

}

})

}

/* SWITCH */

function switchTab(name,e){

paddockAdmin=name

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
e.target.classList.add("active")

let data=horaires[paddockAdmin]

if(data){

document.getElementById("d60").checked=data.durations?.includes(60)
document.getElementById("d90").checked=data.durations?.includes(90)

build(data)

}else{

document.getElementById("daysAdmin").innerHTML="Aucune donnée"

}

}

/* SAVE SAFE */

function save(){

let existing = horaires[paddockAdmin] || {}
let data={...existing}

data.durations=[]

if(document.getElementById("d60").checked) data.durations.push(60)
if(document.getElementById("d90").checked) data.durations.push(90)

document.querySelectorAll(".dayRow").forEach((row,i)=>{

if(!existing[days[i]]) return

const day=days[i]

const closed=!row.querySelector(".closed").classList.contains("off")
const open=row.querySelector(".open").value
const close=row.querySelector(".close").value

data[day]={open,close,closed}

})

db.collection("horaires").doc(paddockAdmin).set(data,{merge:true})

alert("Sauvegardé sans perte ✔")

}

/* UTILS */

function hourOptions(){
let html=""
for(let h=6;h<=22;h++){
let hh=String(h).padStart(2,"0")
html+=`<option value="${hh}:00">${hh}:00</option>`
}
return html
}

function toggleClosed(btn){
btn.classList.toggle("off")
btn.innerText = btn.classList.contains("off") ? "Ouvert" : "Fermé"
}

</script>

</body>
</html>
