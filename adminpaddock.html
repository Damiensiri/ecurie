<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADMIN CONTROL PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#181E3B">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0f1115;
color:white;
}

/* HEADER */

header{
padding:15px;
text-align:center;
font-weight:700;
font-size:20px;
}

/* DAYS */

.days{
display:flex;
gap:8px;
padding:10px;
}

.dayBtn{
flex:1;
background:#1c1f26;
padding:10px;
border-radius:10px;
text-align:center;
}

.dayBtn.active{
background:#2e7d32;
}

/* GRID */

.grid{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

.col{
min-width:260px;
background:#1c1f26;
border-radius:16px;
padding:10px;
}

.slot{
padding:8px;
border-bottom:1px solid #333;
margin-bottom:4px;
border-radius:8px;
}

.free{color:#2ecc71;}
.reserved{color:#e74c3c;}
.past{opacity:0.4;}

button{
background:#e74c3c;
border:none;
padding:4px 8px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* URGENCE */

.urgence{
margin:10px;
padding:12px;
background:#c0392b;
text-align:center;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

/* HORAIRES */

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:20px 10px;
}

.tab{
background:#1c1f26;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
}

.tab.active{
background:#2e7d32;
}

.card{
background:#1c1f26;
margin:12px;
padding:16px;
border-radius:16px;
}

.dayRow{
margin-bottom:14px;
border-bottom:1px solid #333;
padding-bottom:12px;
}

.dayTitle{
font-weight:700;
margin-bottom:6px;
}

.row{
display:flex;
align-items:center;
gap:8px;
}

select{
background:#252a33;
color:white;
border:none;
padding:6px;
border-radius:6px;
}

.closed{
padding:4px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.closed.open{background:#2e7d32;}
.closed.closed{background:#c0392b;}

.durations{
display:flex;
gap:12px;
margin-top:10px;
}

.saveBtn{
margin-top:16px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2e7d32;
color:white;
font-weight:700;
}

</style>
</head>

<body>

<header>ADMIN PADDOCKS 🚀</header>

<div class="days" id="days"></div>

<div class="urgence" onclick="resetAll()">🚨 Vider TOUT (jour)</div>

<div class="grid" id="grid"></div>

<!-- HORAIRES -->

<div class="tabs">
<div class="tab active" onclick="switchTab('maison',event)">Maison</div>
<div class="tab" onclick="switchTab('grande',event)">Grande voie</div>
<div class="tab" onclick="switchTab('beudot',event)">Beudot</div>
</div>

<div class="card">
<div id="daysAdmin"></div>

<div class="durations">
<label><input type="checkbox" id="d60"> 60 min</label>
<label><input type="checkbox" id="d90"> 90 min</label>
</div>

<button class="saveBtn" onclick="save()">Sauvegarder</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE */

firebase.initializeApp({
apiKey:"AIza...",
projectId:"ecurie-paddock"
})

const db=firebase.firestore()

let reservations=[]
let horaires={}
let selectedDate=null
let dragged=null
let paddockAdmin="maison"

const paddocks=["maison","grande","beudot"]

/* DAYS */

function buildDays(){
const container=document.getElementById("days")

for(let i=0;i<3;i++){

let d=new Date()
d.setDate(d.getDate()+i)

let btn=document.createElement("div")
btn.className="dayBtn"
btn.innerText=i===0?"Aujourd’hui":i===1?"Demain":"Après"

let date=formatDate(d)

btn.onclick=()=>{
selectedDate=date
document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
render()
}

container.appendChild(btn)

if(i===0){
btn.classList.add("active")
selectedDate=date
}

}
}

/* LOAD */

db.collection("reservations").onSnapshot(snap=>{
reservations=[]
snap.forEach(doc=>{
let d=doc.data()
d.id=doc.id
reservations.push(d)
})
render()
})

db.collection("horaires").onSnapshot(snap=>{
horaires={}
snap.forEach(doc=>{
horaires[doc.id]=doc.data()
})
switchTab(paddockAdmin,{target:document.querySelector(".tab.active")})
render()
})

/* GRID */

function render(){

let grid=document.getElementById("grid")
grid.innerHTML=""

let now=new Date()
let day=getDayName(selectedDate)

paddocks.forEach(p=>{

let col=document.createElement("div")
col.className="col"

col.innerHTML=`<h3>${p} <button onclick="resetPaddock('${p}')">🧨</button></h3>`

let config=horaires[p]?.[day]

if(!config || config.closed){
col.innerHTML+="Fermé"
grid.appendChild(col)
return
}

let open=parseInt(config.open)
let close=parseInt(config.close)

for(let h=open;h<close;h++){

let time=pad(h)+":00"
let slotTime=new Date(selectedDate+"T"+time)
let isPast=slotTime<now

let res=reservations.find(r=>r.date===selectedDate && r.time===time && r.paddock===p)

let div=document.createElement("div")
div.className="slot"

if(isPast) div.classList.add("past")

if(res){

div.classList.add("reserved")
div.innerHTML=`${time} - ${res.name}`
div.onclick=()=>cancel(res.id)
div.ontouchstart=()=>dragged=res

}else{

div.classList.add("free")
div.innerHTML=`${time} libre`
div.onclick=()=>book(p,time)
div.ontouchend=()=>drop(p,time)

}

col.appendChild(div)
}

grid.appendChild(col)

})

}

/* BOOK */

function book(p,time){
let name=prompt("Nom ?")
if(!name) return

db.collection("reservations").add({
name:name,
paddock:p,
date:selectedDate,
time:time,
duration:60
})
}

/* CANCEL */

function cancel(id){
if(confirm("Annuler ?")){
db.collection("reservations").doc(id).delete()
}
}

/* DRAG */

function drop(p,time){
if(!dragged) return

db.collection("reservations").doc(dragged.id).update({
paddock:p,
time:time
})

dragged=null
}

/* URGENCE */

function resetAll(){
if(!confirm("Tout supprimer ?")) return
reservations.forEach(r=>{
if(r.date===selectedDate){
db.collection("reservations").doc(r.id).delete()
}
})
}

function resetPaddock(p){
if(!confirm("Vider "+p+" ?")) return
reservations.forEach(r=>{
if(r.date===selectedDate && r.paddock===p){
db.collection("reservations").doc(r.id).delete()
}
})
}

/* HORAIRES IDENTIQUES */

const days=["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"]

function switchTab(name,e){

paddockAdmin=name

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
e.target.classList.add("active")

let data=horaires[paddockAdmin]

if(data){
document.getElementById("d60").checked=data.durations?.includes(60)
document.getElementById("d90").checked=data.durations?.includes(90)
build(data)
}
}

function build(data){

const container=document.getElementById("daysAdmin")
container.innerHTML=""

days.forEach(day=>{

let d=data[day]

container.innerHTML+=`
<div class="dayRow">
<div class="dayTitle">${day.toUpperCase()}</div>

<div class="row">
<div class="closed ${d.closed?'closed':'open'}" onclick="toggleClosed(this)">
${d.closed?"Fermé":"Ouvert"}
</div>

<select class="open">${hourOptions()}</select>
<span>→</span>
<select class="close">${hourOptions()}</select>

</div>
</div>
`
})

document.querySelectorAll(".dayRow").forEach((row,i)=>{
let d=data[days[i]]
row.querySelector(".open").value=d.open
row.querySelector(".close").value=d.close
})
}

function save(){

let data={}

data.durations=[]
if(document.getElementById("d60").checked) data.durations.push(60)
if(document.getElementById("d90").checked) data.durations.push(90)

document.querySelectorAll(".dayRow").forEach((row,i)=>{

const day=days[i]

const closed=row.querySelector(".closed").classList.contains("closed")
const open=row.querySelector(".open").value
const close=row.querySelector(".close").value

data[day]={open,close,closed}

})

db.collection("horaires").doc(paddockAdmin).set(data,{merge:true})

alert("Sauvegardé ✔")
}

/* UTILS */

function hourOptions(){
let html=""
for(let h=6;h<=22;h++){
let hh=String(h).padStart(2,"0")
html+=`<option value="${hh}:00">${hh}:00</option>`
}
return html
}

function toggleClosed(btn){
btn.classList.toggle("closed")
btn.classList.toggle("open")
btn.innerText = btn.classList.contains("closed") ? "Fermé" : "Ouvert"
}

function formatDate(d){
return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())
}

function getDayName(date){
const days=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"]
return days[new Date(date).getDay()]
}

function pad(n){
return String(n).padStart(2,"0")
}

buildDays()

</script>

</body>
</html>
