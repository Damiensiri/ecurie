<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADMIN CONTROL PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0f1115;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#181E3B;
position:sticky;
top:0;
z-index:10;
}

/* DAYS */

.days{
display:flex;
gap:8px;
padding:10px;
}

.dayBtn{
flex:1;
background:#1c1f26;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.dayBtn.active{
background:#2e7d32;
}

/* STATS */

.stats{
display:flex;
gap:10px;
padding:10px;
}

.stat{
flex:1;
background:#1c1f26;
padding:10px;
border-radius:12px;
text-align:center;
}

/* URGENCE */

.urgence{
margin:10px;
padding:12px;
background:#c0392b;
text-align:center;
border-radius:12px;
cursor:pointer;
font-weight:700;
}

/* GRID */

.grid{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
}

.col{
min-width:260px;
background:#1c1f26;
border-radius:16px;
padding:10px;
}

.col h3{
margin:0 0 10px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

/* SLOT */

.slot{
padding:8px;
border-bottom:1px solid #333;
border-radius:8px;
margin-bottom:4px;
}

.free{color:#2ecc71}
.reserved{color:#e74c3c}
.past{opacity:0.4}

button{
background:#e74c3c;
border:none;
padding:4px 8px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* HORAIRES */

.horaires{
padding:10px;
}

select{
background:#252a33;
color:white;
border:none;
padding:6px;
border-radius:6px;
margin-bottom:6px;
width:100%;
}

.closed{
background:#c0392b;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
font-size:12px;
display:inline-block;
margin-bottom:5px;
}

.closed.off{
background:#2e7d32;
}

</style>
</head>

<body>

<header>
<div>ADMIN PRO</div>
<div>● LIVE</div>
</header>

<div class="days" id="days"></div>

<div class="stats" id="stats"></div>

<div class="urgence" onclick="resetAll()">
🚨 VIDER TOUS LES PADDOCKS (jour sélectionné)
</div>

<div class="grid" id="grid"></div>

<div class="horaires" id="horaires"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE */

firebase.initializeApp({
apiKey:"AIza...",
projectId:"ecurie-paddock"
})

const db=firebase.firestore()

let reservations=[]
let horaires={}
let selectedDate=null
let knownIds=JSON.parse(localStorage.getItem("knownIds")||"[]")

const paddocks=["maison","grande","beudot"]

/* INIT */

buildDays()

if("Notification" in window){
Notification.requestPermission()
}

/* LOAD */

db.collection("reservations").onSnapshot(snap=>{
reservations=[]
snap.forEach(doc=>{
let d=doc.data()
d.id=doc.id
reservations.push(d)
})
notify()
render()
})

db.collection("horaires").onSnapshot(snap=>{
horaires={}
snap.forEach(doc=>{
horaires[doc.id]=doc.data()
})
render()
})

/* DAYS */

function buildDays(){

const container=document.getElementById("days")

for(let i=0;i<3;i++){

let d=new Date()
d.setDate(d.getDate()+i)

let label=i===0?"Aujourd’hui":i===1?"Demain":"Après"

let date=formatDate(d)

let btn=document.createElement("div")
btn.className="dayBtn"
btn.innerText=label

btn.onclick=()=>{
selectedDate=date
document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
render()
}

container.appendChild(btn)

if(i===0){
btn.classList.add("active")
selectedDate=date
}

}

}

/* RENDER */

function render(){
renderStats()
renderGrid()
renderHoraires()
}

/* STATS */

function renderStats(){

let total = reservations.filter(r=>r.date===selectedDate).length

document.getElementById("stats").innerHTML=`
<div class="stat">Réservations<br>${total}</div>
<div class="stat">Paddocks<br>${paddocks.length}</div>
`

}

/* GRID */

function renderGrid(){

let grid=document.getElementById("grid")
grid.innerHTML=""

let now=new Date()
let dayName=getDayNameFromDate(selectedDate)

paddocks.forEach(p=>{

let col=document.createElement("div")
col.className="col"

col.innerHTML=`
<h3>
${p}
<button onclick="resetPaddock('${p}')">🧨</button>
</h3>
`

let config=horaires[p]?.[dayName]

if(!config || config.closed){
col.innerHTML += "<div>Fermé</div>"
grid.appendChild(col)
return
}

let open=parseInt(config.open.split(":")[0])
let close=parseInt(config.close.split(":")[0])

for(let h=open;h<close;h++){

let time=pad(h)+":00"

let slotTime=new Date(selectedDate+"T"+time)

let isPast=slotTime<now

let res=reservations.find(r=>r.date===selectedDate && r.time===time && r.paddock===p)

let div=document.createElement("div")
div.className="slot"

if(isPast) div.classList.add("past")

if(res){

div.classList.add("reserved")

div.innerHTML=`
${time} - ${res.name}
<button onclick="cancel('${res.id}')">X</button>
`

div.ontouchstart=()=>dragged=res

}else{

div.classList.add("free")
div.innerHTML=`${time} libre`

div.ontouchend=()=>dropSlot(p,time)

}

col.appendChild(div)

}

grid.appendChild(col)

})

}

/* DRAG */

let dragged=null

function dropSlot(p,time){

if(!dragged) return

db.collection("reservations").doc(dragged.id).update({
paddock:p,
time:time
})

dragged=null

}

/* CANCEL */

function cancel(id){
if(confirm("Annuler ?")){
db.collection("reservations").doc(id).delete()
}
}

/* URGENCE */

function resetAll(){

if(!confirm("Tout supprimer ce jour ?")) return

reservations.forEach(r=>{
if(r.date===selectedDate){
db.collection("reservations").doc(r.id).delete()
}
})

}

function resetPaddock(p){

if(!confirm("Vider "+p+" ?")) return

reservations.forEach(r=>{
if(r.date===selectedDate && r.paddock===p){
db.collection("reservations").doc(r.id).delete()
}
})

}

/* NOTIF */

function notify(){

let newOnes = reservations.filter(r=>!knownIds.includes(r.id))

newOnes.forEach(r=>{
new Notification("Nouvelle réservation 🐴",{
body: `${r.name} - ${r.paddock} ${r.time}`
})
})

knownIds = reservations.map(r=>r.id)
localStorage.setItem("knownIds", JSON.stringify(knownIds))

}

/* HORAIRES (TA LOGIQUE) */

function renderHoraires(){

let container=document.getElementById("horaires")
container.innerHTML="<h3>Horaires</h3>"

paddocks.forEach(p=>{

container.innerHTML+=`<div><b>${p}</b><div id="h_${p}"></div></div>`

buildHorairesUI(p)

})

}

function buildHorairesUI(p){

const days=["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"]

let html=""

days.forEach(day=>{

let data=horaires[p]?.[day] || {open:"08:00",close:"19:00",closed:false}

html+=`
<div>
<div class="closed ${data.closed?'':'off'}" onclick="toggleClosed(this)">
${data.closed?"Fermé":"Ouvert"}
</div>

<select class="open">
${hourOptions()}
</select>

<select class="close">
${hourOptions()}
</select>
</div>
`

})

document.getElementById("h_"+p).innerHTML=html

}

function hourOptions(){

let html=""
for(let h=6;h<=22;h++){
let hh=pad(h)
html+=`<option value="${hh}:00">${hh}:00</option>`
}
return html

}

function toggleClosed(btn){
btn.classList.toggle("off")
btn.innerText = btn.classList.contains("off") ? "Ouvert" : "Fermé"
}

/* UTILS */

function formatDate(d){
return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())
}

function getDayNameFromDate(date){
const days=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"]
return days[new Date(date).getDay()]
}

function pad(n){
return String(n).padStart(2,"0")
}

</script>

</body>
</html>
