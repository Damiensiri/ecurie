<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADMIN CONTROL PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#181E3B">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Montserrat',sans-serif;background:#0f1115;color:white;}
header{display:flex;justify-content:space-between;padding:15px;background:#181E3B;}
.days{display:flex;gap:8px;padding:10px;}
.dayBtn{flex:1;background:#1c1f26;padding:10px;border-radius:10px;text-align:center;}
.dayBtn.active{background:#2e7d32;}
.stats{display:flex;gap:10px;padding:10px;}
.stat{flex:1;background:#1c1f26;padding:10px;border-radius:12px;text-align:center;}
.grid{display:flex;gap:10px;padding:10px;overflow-x:auto;}
.col{min-width:260px;background:#1c1f26;border-radius:16px;padding:10px;}
.slot{padding:8px;border-bottom:1px solid #333;margin-bottom:4px;border-radius:8px;}
.free{color:#2ecc71;}
.reserved{color:#e74c3c;}
.past{opacity:0.4;}
button{background:#e74c3c;border:none;padding:4px 8px;border-radius:6px;color:white;}
</style>
</head>

<body>

<header>
<div>ADMIN 🚀</div>
<div>LIVE</div>
</header>

<div class="days" id="days"></div>
<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* PWA */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

/* FIREBASE */
firebase.initializeApp({
apiKey:"AIza...",
projectId:"ecurie-paddock"
})
const db=firebase.firestore()

let reservations=[]
let horaires={}
let selectedDate=null
let dragged=null

const paddocks=["maison","grande","beudot"]

/* DAYS */

function buildDays(){
let container=document.getElementById("days")

for(let i=0;i<3;i++){
let d=new Date()
d.setDate(d.getDate()+i)

let btn=document.createElement("div")
btn.className="dayBtn"
btn.innerText=i===0?"Aujourd’hui":i===1?"Demain":"Après"

let date=formatDate(d)

btn.onclick=()=>{
selectedDate=date
document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
render()
}

container.appendChild(btn)

if(i===0){
btn.classList.add("active")
selectedDate=date
}
}
}

/* LOAD */

db.collection("reservations").onSnapshot(snap=>{
reservations=[]
snap.forEach(doc=>{
let d=doc.data()
d.id=doc.id
reservations.push(d)
})
render()
})

db.collection("horaires").onSnapshot(snap=>{
horaires={}
snap.forEach(doc=>{
horaires[doc.id]=doc.data()
})
render()
})

/* RENDER */

function render(){
renderStats()
renderGrid()
}

/* STATS */

function renderStats(){

let total = reservations.filter(r=>r.date===selectedDate).length

let ouverts = paddocks.filter(p=>{
let day=getDayName(selectedDate)
return !horaires[p]?.[day]?.closed
}).length

document.getElementById("stats").innerHTML=`
<div class="stat">${total} résas</div>
<div class="stat">${ouverts} paddocks ouverts</div>
`
}

/* GRID */

function renderGrid(){

let grid=document.getElementById("grid")
grid.innerHTML=""

let now=new Date()
let day=getDayName(selectedDate)

paddocks.forEach(p=>{

let col=document.createElement("div")
col.className="col"
col.innerHTML=`<h3>${p}</h3>`

let config=horaires[p]?.[day]

if(!config || config.closed){
col.innerHTML+="Fermé"
grid.appendChild(col)
return
}

let open=parseInt(config.open)
let close=parseInt(config.close)

for(let h=open;h<close;h++){

let time=pad(h)+":00"

let slotTime=new Date(selectedDate+"T"+time)
let isPast=slotTime<now

let res=reservations.find(r=>r.date===selectedDate && r.time===time && r.paddock===p)

let div=document.createElement("div")
div.className="slot"

if(isPast) div.classList.add("past")

if(res){

div.classList.add("reserved")
div.innerHTML=`${time} - ${res.name}`
div.onclick=()=>cancel(res.id)
div.ontouchstart=()=>dragged=res

}else{

div.classList.add("free")
div.innerHTML=`${time} libre`
div.onclick=()=>book(p,time)
div.ontouchend=()=>drop(p,time)

}

col.appendChild(div)
}

grid.appendChild(col)
})

}

/* BOOK */

function book(p,time){

let name=prompt("Nom ?")
if(!name) return

db.collection("reservations").add({
name:name,
paddock:p,
date:selectedDate,
time:time,
duration:60
})

}

/* CANCEL */

function cancel(id){
if(confirm("Annuler ?")){
db.collection("reservations").doc(id).delete()
}
}

/* DRAG */

function drop(p,time){

if(!dragged) return

db.collection("reservations").doc(dragged.id).update({
paddock:p,
time:time
})

dragged=null
}

/* UTILS */

function formatDate(d){
return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())
}

function getDayName(date){
const days=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"]
return days[new Date(date).getDay()]
}

function pad(n){
return String(n).padStart(2,"0")
}

buildDays()

</script>

</body>
</html>
