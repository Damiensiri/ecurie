<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Affiche Grand Rang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    body {
      margin:0;
      font-family: 'Bebas Neue', Arial, sans-serif;
      background:#dcdcdc;
    }

    .poster {
      width: 1536px;
      height: 864px;
      position: relative;
      overflow: hidden;
      border-radius: 0;
      background:#071d14;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    }

    .photo {
      position:absolute;
      top:0;
      right:0;
      width:66%;
      height:100%;
      object-fit:cover;
      filter: contrast(1.15) saturate(1.08) brightness(0.9);
    }

    .overlay {
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,
      rgba(4,18,12,0.98) 0%,
      rgba(4,18,12,0.96) 28%,
      rgba(4,18,12,0.78) 45%,
      rgba(4,18,12,0.25) 65%,
      rgba(0,0,0,0) 78%);
    }

    .grain {
      position:absolute;
      inset:0;
      opacity:.08;
      background-image:
      radial-gradient(rgba(255,255,255,.4) 1px, transparent 1px),
      radial-gradient(rgba(0,0,0,.35) 1px, transparent 1px);
      background-size:13px 13px,21px 21px;
      mix-blend-mode:overlay;
      pointer-events:none;
    }

    .vignette {
      position:absolute;
      inset:0;
      background:radial-gradient(circle at center, transparent 48%, rgba(0,0,0,.34) 100%);
      pointer-events:none;
    }

    .brush-white {
      position:absolute;
      top:-90px;
      right:-90px;
      width:420px;
      height:420px;
      background:white;
      border-radius:50%;
      box-shadow:0 0 0 20px rgba(255,255,255,.03);
    }

    .brush-white:before {
      content:'';
      position:absolute;
      inset:-18px;
      border-radius:50%;
      border:12px dashed rgba(0,0,0,.12);
      transform:rotate(12deg);
    }

    .stroke {
      text-shadow:
      3px 3px 0 rgba(0,0,0,.35),
      8px 8px 24px rgba(0,0,0,.5);
    }

    .gold {
      color:#d89a34;
      text-shadow:
      2px 2px 0 rgba(0,0,0,.35),
      0 0 20px rgba(216,154,52,.2);
    }

    .report-banner {
      position:absolute;
      left:55px;
      top:500px;
      transform:rotate(-3deg);
      z-index:5;
    }

    .report-top {
      background:linear-gradient(90deg,#9c0e11,#d31d1d);
      color:white;
      padding:16px 38px;
      font-family:'Anton',sans-serif;
      font-size:92px;
      line-height:.9;
      letter-spacing:1px;
      box-shadow:0 10px 30px rgba(0,0,0,.45);
      position:relative;
    }

    .report-top:after {
      content:'';
      position:absolute;
      inset:0;
      background:repeating-linear-gradient(-45deg,rgba(255,255,255,.03),rgba(255,255,255,.03) 10px,rgba(0,0,0,.03) 10px,rgba(0,0,0,.03) 20px);
      mix-blend-mode:overlay;
    }

    .report-bottom {
      background:white;
      color:#c41616;
      padding:10px 34px;
      font-family:'Anton',sans-serif;
      font-size:74px;
      line-height:1;
      display:inline-block;
      margin-left:38px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .footer-band {
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:145px;
      background:linear-gradient(180deg,#072244,#05162c);
      z-index:3;
    }

    .footer-band:before {
      content:'';
      position:absolute;
      inset:0;
      background:repeating-linear-gradient(90deg,rgba(255,255,255,.02),rgba(255,255,255,.02) 2px,transparent 2px,transparent 5px);
      opacity:.25;
    }

  </style>
</head>
<body class="p-8">

<div class="flex flex-col xl:flex-row gap-8 items-start">

  <!-- CONTROLS -->
  <div class="bg-white rounded-3xl shadow-xl p-6 w-full xl:w-[360px] space-y-4">
    <h2 class="text-2xl font-bold">Éditeur d'affiche</h2>

    <div>
      <label class="font-semibold">Titre</label>
      <input id="titleInput" type="text" value="PROMENADE" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Sous-titre</label>
      <input id="subtitleInput" type="text" value="à cheval" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Date initiale</label>
      <input id="dateInput" type="text" value="SAMEDI 14 JUIN" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Horaire</label>
      <input id="timeInput" type="text" value="14H - 17H" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Texte report</label>
      <input id="reportInput" type="text" value="REPORTÉE AU DIMANCHE 21 JUIN" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Prix</label>
      <input id="priceInput" type="text" value="35€" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Réservation</label>
      <input id="footerInput" type="text" value="Réservation obligatoire • 06.52.54.68.78" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Photo</label>
      <input id="imageInput" type="file" accept="image/*" class="w-full mt-2" />
    </div>

    <div class="flex gap-3 pt-2">
      <button onclick="toggleReport()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-bold">
        Afficher/Masquer Report
      </button>

      <button onclick="downloadPoster()" class="bg-green-700 hover:bg-green-800 text-white px-4 py-2 rounded-xl font-bold">
        Export PNG
      </button>
    </div>
  </div>

  <!-- POSTER -->
  <div id="poster" class="poster scale-[0.58] origin-top-left">

    <img
      id="posterImage"
      class="photo"
      src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1400&auto=format&fit=crop"
    />

    <div class="overlay"></div>
    <div class="grain"></div>
    <div class="vignette"></div>
    <div class="brush-white"></div>
    <div class="footer-band"></div>

    <div class="absolute left-[48px] top-[20px] z-10">
      <div id="posterTitle" class="text-white text-[150px] font-black uppercase tracking-tight stroke leading-[0.88]" style="font-family:'Anton', sans-serif; letter-spacing:1px;">
        PROMENADE
      </div>

      <div id="posterSubtitle" class="gold text-[115px] italic -mt-2 stroke" style="font-family:cursive; font-weight:700;">
        à cheval
      </div>
    </div>

    <div class="absolute left-[58px] top-[350px] text-white z-10">
      <div id="posterDate" class="text-[74px] font-black uppercase leading-[0.9] stroke" style="font-family:'Anton', sans-serif;">
        SAMEDI<br/>14 JUIN
      </div>

      <div id="posterTime" class="text-[66px] font-black mt-7 stroke" style="font-family:'Anton', sans-serif;">
        14H - 17H
      </div>
    </div>

    <div id="reportBanner" class="report-banner">
      <div class="report-top">
        REPORTÉE !
      </div>
      <div id="posterReport" class="report-bottom">
        AU DIMANCHE 21 JUIN
      </div>
    </div>

    <div class="absolute left-[35px] bottom-[80px] z-10">
      <div class="w-[210px] h-[210px] rounded-full bg-[#dca03a] flex items-center justify-center shadow-2xl border-[8px] border-[#11111155]">
        <div id="posterPrice" class="text-[100px] font-black text-black" style="font-family:'Anton', sans-serif;">
          35€
        </div>
      </div>
    </div>

    <div class="absolute bottom-[38px] left-[340px] text-white text-[34px] font-semibold z-10 stroke" style="font-family:'Bebas Neue', sans-serif; letter-spacing:1px;">
      <div id="posterFooter">
        Réservation obligatoire • 06.52.54.68.78
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
  const bind = (inputId, targetId, formatter = null) => {
    const input = document.getElementById(inputId);
    const target = document.getElementById(targetId);

    input.addEventListener('input', () => {
      target.innerHTML = formatter ? formatter(input.value) : input.value;
    });
  };

  bind('titleInput', 'posterTitle');
  bind('subtitleInput', 'posterSubtitle');
  bind('dateInput', 'posterDate', value => value.replace(' ', '<br/>'));
  bind('timeInput', 'posterTime');
  bind('reportInput', 'posterReport', value => value.replace('AU ', 'AU<br/>'));
  bind('priceInput', 'posterPrice');
  bind('footerInput', 'posterFooter');

  document.getElementById('imageInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
      document.getElementById('posterImage').src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  function toggleReport() {
    const banner = document.getElementById('reportBanner');
    banner.style.display = banner.style.display === 'none' ? 'block' : 'none';
  }

  async function downloadPoster() {
    const poster = document.getElementById('poster');

    const canvas = await html2canvas(poster, {
      useCORS: true,
      scale: 2
    });

    const link = document.createElement('a');
    link.download = 'affiche-grand-rang.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
</script>

</body>
</html>
