<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Affiche Grand Rang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    body {
      margin:0;
      font-family: 'Bebas Neue', Arial, sans-serif;
      background:#dcdcdc;
    }

    .poster {
      width: 1536px;
      height: 864px;
      position: relative;
      overflow: hidden;
      border-radius: 0;
      background:#071d14;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    }

    .photo {
      position:absolute;
      top:0;
      right:0;
      width:66%;
      height:100%;
      object-fit:cover;
      filter: contrast(1.15) saturate(1.08) brightness(0.9);
    }

    .overlay {
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,
      rgba(4,18,12,0.98) 0%,
      rgba(4,18,12,0.96) 28%,
      rgba(4,18,12,0.78) 45%,
      rgba(4,18,12,0.25) 65%,
      rgba(0,0,0,0) 78%);
    }

    .grain {
      position:absolute;
      inset:0;
      opacity:.08;
      background-image:
      radial-gradient(rgba(255,255,255,.4) 1px, transparent 1px),
      radial-gradient(rgba(0,0,0,.35) 1px, transparent 1px);
      background-size:13px 13px,21px 21px;
      mix-blend-mode:overlay;
      pointer-events:none;
    }

    .vignette {
      position:absolute;
      inset:0;
      background:radial-gradient(circle at center, transparent 48%, rgba(0,0,0,.34) 100%);
      pointer-events:none;
    }

    .brush-white {
      position:absolute;
      top:-90px;
      right:-90px;
      width:420px;
      height:420px;
      background:white;
      border-radius:50%;
      box-shadow:0 0 0 20px rgba(255,255,255,.03);
    }

    .brush-white:before {
      content:'';
      position:absolute;
      inset:-18px;
      border-radius:50%;
      border:12px dashed rgba(0,0,0,.12);
      transform:rotate(12deg);
    }

    .stroke {
      text-shadow:
      3px 3px 0 rgba(0,0,0,.35),
      8px 8px 24px rgba(0,0,0,.5);
    }

    .gold {
      color:#d89a34;
      text-shadow:
      2px 2px 0 rgba(0,0,0,.35),
      0 0 20px rgba(216,154,52,.2);
    }

    .report-banner {
      position:absolute;
      left:55px;
      top:500px;
      transform:rotate(-3deg);
      z-index:5;
    }

    .report-top {
      background:linear-gradient(90deg,#8d090c,#d51717 55%,#f02a2a);
      color:white;
      padding:20px 44px;
      font-family:'Anton',sans-serif;
      font-size:102px;
      line-height:.9;
      letter-spacing:1px;
      box-shadow:0 16px 34px rgba(0,0,0,.45);
      position:relative;
      clip-path:polygon(1% 6%, 98% 0%, 100% 84%, 2% 100%);
    }

    .report-top:after {
      content:'';
      position:absolute;
      inset:0;
      background:repeating-linear-gradient(-45deg,rgba(255,255,255,.03),rgba(255,255,255,.03) 10px,rgba(0,0,0,.03) 10px,rgba(0,0,0,.03) 20px);
      mix-blend-mode:overlay;
    }

    .report-bottom {
      background:white;
      color:#c41616;
      padding:14px 38px;
      font-family:'Anton',sans-serif;
      font-size:82px;
      line-height:1;
      display:inline-block;
      margin-left:42px;
      margin-top:-8px;
      box-shadow:0 12px 28px rgba(0,0,0,.35);
      clip-path:polygon(2% 0%, 100% 6%, 97% 100%, 0% 92%);
    }

    .footer-band {
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:145px;
      background:linear-gradient(180deg,#072244,#05162c);
      z-index:3;
    }

    .footer-band:before {
      content:'';
      position:absolute;
      inset:0;
      background:repeating-linear-gradient(90deg,rgba(255,255,255,.02),rgba(255,255,255,.02) 2px,transparent 2px,transparent 5px);
      opacity:.25;
    }

  </style>
</head>
<body class="p-8 bg-[#d7d7d7]">

<div class="flex flex-col xl:flex-row gap-8 items-start">

  <!-- CONTROLS -->
  <div class="bg-white rounded-3xl shadow-xl p-6 w-full xl:w-[360px] space-y-4">
    <h2 class="text-2xl font-bold">Éditeur d'affiche</h2>

    <div>
      <label class="font-semibold">Titre</label>
      <input id="titleInput" type="text" value="PROMENADE" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Sous-titre</label>
      <input id="subtitleInput" type="text" value="à cheval" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Date initiale</label>
      <input id="dateInput" type="text" value="SAMEDI 14 JUIN" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Horaire</label>
      <input id="timeInput" type="text" value="14H - 17H" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Texte report</label>
      <input id="reportInput" type="text" value="REPORTÉE AU DIMANCHE 21 JUIN" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Prix</label>
      <input id="priceInput" type="text" value="35€" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Réservation</label>
      <input id="footerInput" type="text" value="Réservation obligatoire • 06.52.54.68.78" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Photo</label>
      <input id="imageInput" type="file" accept="image/*" class="w-full mt-2" />
    </div>

    <div class="flex gap-3 pt-2">
      <button onclick="toggleReport()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-bold">
        Afficher/Masquer Report
      </button>

      <button onclick="downloadPoster()" class="bg-green-700 hover:bg-green-800 text-white px-4 py-2 rounded-xl font-bold">
        Export PNG
      </button>
    </div>
  </div>

  <!-- POSTER -->
  <div id="poster" class="relative w-[1536px] h-[864px] scale-[0.58] origin-top-left overflow-hidden shadow-2xl bg-black rounded-none">

    <!-- BASE ORIGINAL IMAGE -->
    <img
      id="basePoster"
      src="affiche-originale.jpg"
      class="absolute inset-0 w-full h-full object-cover"
    />

    <!-- REPLACEABLE PHOTO AREA -->
    <img
      id="posterImage"
      class="absolute top-0 right-0 w-[62%] h-full object-cover opacity-0 pointer-events-none"
      src=""
    />

    <!-- IMPORTANT:
    Le fichier 'affiche-originale.jpg' doit être TON affiche exacte.
    Le système ajoute uniquement des éléments éditables PAR-DESSUS.
    -->

    <!-- DYNAMIC DATE -->
    <div id="posterDate"
      class="absolute bottom-[82px] left-[395px] text-white text-[72px] leading-[0.88] font-black uppercase"
      style="font-family:'Anton',sans-serif;text-shadow:4px 4px 10px rgba(0,0,0,.45);">
      SAMEDI<br>21 JUIN
    </div>

    <!-- DYNAMIC TIME -->
    <div id="posterTime"
      class="absolute bottom-[98px] left-[735px] text-white text-[70px] font-black uppercase"
      style="font-family:'Anton',sans-serif;text-shadow:4px 4px 10px rgba(0,0,0,.45);">
      14H - 17H
    </div>

    <!-- DYNAMIC PRICE -->
    <div id="posterPrice"
      class="absolute left-[70px] bottom-[162px] text-black text-[92px] font-black"
      style="font-family:'Anton',sans-serif;">
      35€
    </div>

    <!-- STATUS BANNER -->
    <div id="statusBanner" class="absolute left-[150px] top-[290px] rotate-[-2deg] z-20">
      <div id="statusTop"
        class="bg-[#c91515] text-white text-[92px] px-[34px] py-[12px] leading-none"
        style="font-family:'Anton',sans-serif; box-shadow:0 10px 25px rgba(0,0,0,.35);">
        REPORTÉE
      </div>

      <div id="statusBottom"
        class="bg-white text-[#c91515] text-[82px] px-[30px] py-[6px] ml-[32px] leading-none"
        style="font-family:'Anton',sans-serif; box-shadow:0 10px 25px rgba(0,0,0,.28);">
        AU 21 JUIN
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
  const bind = (inputId, targetId, formatter = null) => {
    const input = document.getElementById(inputId);
    const target = document.getElementById(targetId);

    if (!input || !target) return;

    input.addEventListener('input', () => {
      target.innerHTML = formatter ? formatter(input.value) : input.value;
    });
  };

  bind('dateInput', 'posterDate', value => value.replace(' ', '<br>'));
  bind('timeInput', 'posterTime');
  bind('priceInput', 'posterPrice');

  const reportInput = document.getElementById('reportInput');
  reportInput.addEventListener('input', () => {
    const value = reportInput.value;

    const parts = value.split('|');

    document.getElementById('statusTop').innerText = parts[0] || 'REPORTÉE';
    document.getElementById('statusBottom').innerText = parts[1] || 'AU 21 JUIN';
  });

  document.getElementById('imageInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
      const img = document.getElementById('posterImage');
      img.src = event.target.result;
      img.style.opacity = '1';
    };
    reader.readAsDataURL(file);
  });

  function toggleReport() {
    const banner = document.getElementById('statusBanner');
    banner.style.display = banner.style.display === 'none' ? 'block' : 'none';
  }

  async function downloadPoster() {
    const poster = document.getElementById('poster');

    const canvas = await html2canvas(poster, {
      useCORS: true,
      scale: 2
    });

    const link = document.createElement('a');
    link.download = 'affiche-grand-rang.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
</script>

</body>
</html>

</body>
</html>
