<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Affiche Grand Rang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Bebas Neue', Arial, sans-serif;
      background: #e5e5e5;
    }

    .poster {
      background:
      radial-gradient(circle at top left, rgba(255,255,255,0.05), transparent 30%),
      linear-gradient(135deg, #0d2b1f 0%, #10281f 35%, #091c14 100%);
      width: 1200px;
      height: 675px;
      position: relative;
      overflow: hidden;
      background: #0d2b1f;
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    .photo {
      filter: contrast(1.12) saturate(1.08) brightness(0.92) sepia(0.08);
      position: absolute;
      top: 0;
      right: 0;
      width: 62%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(13,43,31,1) 35%, rgba(13,43,31,0.6) 52%, rgba(13,43,31,0) 70%);
    }

    .texture {
      position: absolute;
      inset: 0;
      opacity: 0.09;
      background-image:
        radial-gradient(rgba(255,255,255,0.35) 1px, transparent 1px),
        radial-gradient(rgba(0,0,0,0.25) 1px, transparent 1px);
      background-size: 14px 14px, 21px 21px;
      background-position: 0 0, 8px 8px;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    .paint-overlay {
      position: absolute;
      inset: 0;
      background:
      linear-gradient(110deg, rgba(255,255,255,0.06), transparent 35%),
      linear-gradient(290deg, rgba(0,0,0,0.18), transparent 40%);
      mix-blend-mode: soft-light;
      pointer-events: none;
    }

    .report-banner {
      transform: rotate(-2deg);
      box-shadow: 0 12px 28px rgba(0,0,0,0.45);
      border: 2px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(2px);
    }

    .stroke {
      text-shadow:
        3px 3px 0 rgba(0,0,0,0.35),
        0 0 18px rgba(0,0,0,0.3),
        6px 6px 22px rgba(0,0,0,0.45);
    }

    .gold {
      color: #e0a63d;
      text-shadow:
      2px 2px 0 rgba(0,0,0,0.35),
      0 0 18px rgba(224,166,61,0.2);
    }
  </style>
</head>
<body class="p-8">

<div class="flex flex-col xl:flex-row gap-8 items-start">

  <!-- CONTROLS -->
  <div class="bg-white rounded-3xl shadow-xl p-6 w-full xl:w-[360px] space-y-4">
    <h2 class="text-2xl font-bold">Éditeur d'affiche</h2>

    <div>
      <label class="font-semibold">Titre</label>
      <input id="titleInput" type="text" value="PROMENADE" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Sous-titre</label>
      <input id="subtitleInput" type="text" value="à cheval" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Date initiale</label>
      <input id="dateInput" type="text" value="SAMEDI 14 JUIN" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Horaire</label>
      <input id="timeInput" type="text" value="14H - 17H" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Texte report</label>
      <input id="reportInput" type="text" value="REPORTÉE AU DIMANCHE 21 JUIN" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Prix</label>
      <input id="priceInput" type="text" value="35€" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Réservation</label>
      <input id="footerInput" type="text" value="Réservation obligatoire • 06.52.54.68.78" class="w-full border rounded-xl p-2 mt-1" />
    </div>

    <div>
      <label class="font-semibold">Photo</label>
      <input id="imageInput" type="file" accept="image/*" class="w-full mt-2" />
    </div>

    <div class="flex gap-3 pt-2">
      <button onclick="toggleReport()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl font-bold">
        Afficher/Masquer Report
      </button>

      <button onclick="downloadPoster()" class="bg-green-700 hover:bg-green-800 text-white px-4 py-2 rounded-xl font-bold">
        Export PNG
      </button>
    </div>
  </div>

  <!-- POSTER -->
  <div id="poster" class="poster scale-[0.7] origin-top-left">

    <img
      id="posterImage"
      class="photo"
      src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=1400&auto=format&fit=crop"
    />

    <div class="overlay"></div>
    <div class="texture"></div>
    <div class="paint-overlay"></div>

    <div class="absolute left-12 top-10 z-10">
      <div id="posterTitle" class="text-white text-8xl font-black uppercase tracking-wider stroke leading-none" style="font-family:'Anton', sans-serif; letter-spacing:2px;">
        PROMENADE
      </div>

      <div id="posterSubtitle" class="gold text-7xl italic mt-2 stroke">
        à cheval
      </div>
    </div>

    <div class="absolute left-14 top-[250px] text-white z-10">
      <div id="posterDate" class="text-4xl font-black uppercase leading-tight stroke">
        SAMEDI<br/>14 JUIN
      </div>

      <div id="posterTime" class="text-3xl font-bold mt-5 stroke">
        14H - 17H
      </div>
    </div>

    <div id="reportBanner" class="report-banner absolute left-8 top-[420px] bg-gradient-to-r from-red-800 to-red-600 text-white px-10 py-6 rounded-[28px] z-10">
      <div id="posterReport" class="text-4xl font-black uppercase leading-tight">
        REPORTÉE AU<br/>DIMANCHE 21 JUIN
      </div>
    </div>

    <div class="absolute left-10 bottom-10 z-10">
      <div class="w-32 h-32 rounded-full bg-[#e0a63d] flex items-center justify-center shadow-2xl">
        <div id="posterPrice" class="text-5xl font-black text-black">
          35€
        </div>
      </div>
    </div>

    <div class="absolute bottom-8 left-[220px] text-white text-2xl font-semibold z-10 stroke">
      <div id="posterFooter">
        Réservation obligatoire • 06.52.54.68.78
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
  const bind = (inputId, targetId, formatter = null) => {
    const input = document.getElementById(inputId);
    const target = document.getElementById(targetId);

    input.addEventListener('input', () => {
      target.innerHTML = formatter ? formatter(input.value) : input.value;
    });
  };

  bind('titleInput', 'posterTitle');
  bind('subtitleInput', 'posterSubtitle');
  bind('dateInput', 'posterDate', value => value.replace(' ', '<br/>'));
  bind('timeInput', 'posterTime');
  bind('reportInput', 'posterReport', value => value.replace('AU ', 'AU<br/>'));
  bind('priceInput', 'posterPrice');
  bind('footerInput', 'posterFooter');

  document.getElementById('imageInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
      document.getElementById('posterImage').src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  function toggleReport() {
    const banner = document.getElementById('reportBanner');
    banner.style.display = banner.style.display === 'none' ? 'block' : 'none';
  }

  async function downloadPoster() {
    const poster = document.getElementById('poster');

    const canvas = await html2canvas(poster, {
      useCORS: true,
      scale: 2
    });

    const link = document.createElement('a');
    link.download = 'affiche-grand-rang.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }
</script>

</body>
</html>
