<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paddock Control V7</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#0f1115;color:white;}
header{background:#181E3B;padding:15px;text-align:center;font-weight:700;}

.days{display:flex;gap:8px;padding:10px;}
.day{flex:1;background:#1c1f26;padding:10px;border-radius:10px;text-align:center;}
.day.active{background:#2ecc71;color:black;}

.grid{padding:10px;display:flex;flex-direction:column;gap:8px;}

.row{display:flex;gap:6px;align-items:center;}
.time{width:60px;font-size:12px;color:#aaa;}

.slot{
flex:1;
padding:10px;
border-radius:8px;
text-align:center;
font-weight:600;
}

.free{background:#1f8f5f;}
.resa{background:#c0392b;}
.closedSlot{background:#555;color:#bbb;}
.selected{outline:3px solid #2ecc71;}

.actionBar{
position:fixed;
bottom:0;
width:100%;
background:#181E3B;
padding:10px;
display:flex;
gap:10px;
}

.actionBar input,
.actionBar select{
flex:1;
padding:10px;
border-radius:8px;
border:none;
}

.actionBar button{
padding:10px;
border:none;
border-radius:8px;
background:#2ecc71;
font-weight:600;
}

.block{
margin:20px 10px 100px;
background:#1c1f26;
padding:15px;
border-radius:15px;
}

.tabs{display:flex;gap:10px;margin-bottom:10px;}
.tab{background:#181E3B;padding:8px;border-radius:8px;cursor:pointer;}
.tab.active{background:#2ecc71;color:black;}

.dayRow{margin-bottom:12px;border-bottom:1px solid #333;padding-bottom:10px;}
.row2{display:flex;align-items:center;gap:8px;}

select{
background:#252a33;
color:white;
border:none;
border-radius:6px;
}

.closed{
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}
.closed.off{background:#2ecc71;}
.closed:not(.off){background:#e74c3c;}

button{cursor:pointer;}

#toast{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
background:#181E3B;
padding:10px 15px;
border-radius:10px;
opacity:0;
transition:0.3s;
}
#toast.show{opacity:1;}

</style>
</head>

<body>

<header>🐎 Paddock Control V7</header>

<div class="days" id="days"></div>
<div class="grid" id="grid"></div>

<!-- ACTIONS RESET -->

<div style="padding:10px;display:flex;gap:10px;flex-wrap:wrap">

<button onclick="clearAll()" style="background:#e74c3c">Tout vider</button>
<button onclick="clearPaddock('maison')">Maison</button>
<button onclick="clearPaddock('grande')">Grande</button>
<button onclick="clearPaddock('beudot')">Beudot</button>

</div>

<!-- HORAIRES -->

<div class="block">

<div class="tabs">
<div class="tab active" onclick="switchTab('maison',event)">Maison</div>
<div class="tab" onclick="switchTab('grande',event)">Grande</div>
<div class="tab" onclick="switchTab('beudot',event)">Beudot</div>
</div>

<div id="daysAdmin"></div>

<button onclick="save()">Sauvegarder</button>

</div>

<!-- ACTION BAR -->

<div class="actionBar">
<input id="name" placeholder="Nom client">

<select id="duration">
<option value="60">1h</option>
<option value="90">1h30</option>
</select>

<button onclick="book()">Réserver</button>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE */

firebase.initializeApp({
apiKey:"AIza...",
projectId:"ecurie-paddock"
})

const db=firebase.firestore()

let reservations=[]
let horaires={}
let selectedDate=""
let selectedSlot=null

const paddocks=["maison","grande","beudot"]

/* TOAST */

function toast(t){
let el=document.getElementById("toast")
el.innerText=t
el.classList.add("show")
setTimeout(()=>el.classList.remove("show"),2000)
}

/* DATE */

function buildDays(){

for(let i=0;i<3;i++){
let d=new Date()
d.setDate(d.getDate()+i)

let el=document.createElement("div")
el.className="day"
el.innerText=i===0?"Aujourd’hui":i===1?"Demain":"Après"

let date=format(d)

el.onclick=()=>{
selectedDate=date
updateDays()
render()
}

document.getElementById("days").appendChild(el)

if(i===0) selectedDate=date
}

updateDays()
}

function updateDays(){
document.querySelectorAll(".day").forEach((d,i)=>{
let ref=format(new Date(Date.now()+i*86400000))
d.classList.toggle("active",ref===selectedDate)
})
}

/* SLOT LOGIC */

function isSlotTaken(r,time){
let [rh,rm]=r.time.split(":").map(Number)
let start=rh+(rm/60)
let end=start+(r.duration||60)/60
let [sh,sm]=time.split(":").map(Number)
let slot=sh+(sm/60)
return slot>=start && slot<end
}

/* RENDER INTELLIGENT */

function render(){

let grid=document.getElementById("grid")
grid.innerHTML=""

let day=getDayName(selectedDate)

let slotsSet=new Set()

paddocks.forEach(p=>{

let config=horaires[p]?.[day]
if(!config || config.closed) return

let [oh,om]=config.open.split(":").map(Number)
let [ch,cm]=config.close.split(":").map(Number)

let current=oh+(om/60)
let end=ch+(cm/60)

while(current<end){

let h=Math.floor(current)
let m=current%1===0?"00":"30"
let time=pad(h)+":"+m

slotsSet.add(time)

let resa=reservations.find(r=>r.date===selectedDate && r.paddock===p && r.time===time)

if(resa){
current+=resa.duration/60
}else{
current+=1
}

}

})

let slots=[...slotsSet].sort()

/* HEADER */

let header=document.createElement("div")
header.className="row"
header.innerHTML=`<div class="time"></div>`

paddocks.forEach(p=>{
header.innerHTML+=`<div class="slot" style="background:#181E3B">${p}</div>`
})

grid.appendChild(header)

/* ROWS */

slots.forEach(time=>{

let row=document.createElement("div")
row.className="row"
row.innerHTML=`<div class="time">${time}</div>`

paddocks.forEach(p=>{

let config=horaires[p]?.[day]

let cell=document.createElement("div")
cell.className="slot"

if(!config || config.closed){

cell.classList.add("closedSlot")
cell.innerText="Fermé"

}else{

let resa=reservations.find(r=>r.date===selectedDate && r.paddock===p && isSlotTaken(r,time))

if(resa){

cell.classList.add("resa")
cell.innerText=resa.name
cell.onclick=()=>cancel(resa.id)

}else{

cell.classList.add("free")
cell.innerText="+"

cell.onclick=()=>{
selectedSlot={p,time}
highlight(cell)
}

}

}

row.appendChild(cell)

})

grid.appendChild(row)

})

}

function highlight(el){
document.querySelectorAll(".slot").forEach(s=>s.classList.remove("selected"))
el.classList.add("selected")
}

/* BOOK */

function book(){

if(!selectedSlot) return toast("Choisir un créneau")

let name=document.getElementById("name").value.trim()
if(!name) return toast("Nom requis")

let duration=parseInt(document.getElementById("duration").value)

db.collection("reservations").add({
name,
paddock:selectedSlot.p,
date:selectedDate,
time:selectedSlot.time,
duration
})

document.getElementById("name").value=""
selectedSlot=null

toast("Réservé ✔")
}

/* CANCEL */

function cancel(id){
if(!confirm("Annuler ?")) return
db.collection("reservations").doc(id).delete()
toast("Annulé")
}

/* RESET */

async function clearAll(){
if(!confirm("Tout supprimer ?")) return
let snap=await db.collection("reservations").get()
snap.forEach(doc=>doc.ref.delete())
toast("Tout vidé")
}

async function clearPaddock(p){
if(!confirm("Vider "+p+" ?")) return
let snap=await db.collection("reservations").where("paddock","==",p).get()
snap.forEach(doc=>doc.ref.delete())
toast(p+" vidé")
}

/* HORAIRES (SAFE) */

const daysList=["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"]
let paddock="maison"

function switchTab(name,e){
paddock=name
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
e.target.classList.add("active")

db.collection("horaires").doc(paddock).get().then(doc=>{
buildHoraires(doc.data())
})
}

function buildHoraires(data){

let container=document.getElementById("daysAdmin")
container.innerHTML=""

daysList.forEach(day=>{

let d = data?.[day] || {open:"08:00",close:"19:00",closed:false}

container.innerHTML+=`
<div class="dayRow">
<div>${day}</div>

<div class="row2">
<div class="closed ${d.closed?'':'off'}" onclick="toggleClosed(this)">
${d.closed?"Fermé":"Ouvert"}
</div>

<select class="open">${options(d.open)}</select>
<select class="close">${options(d.close)}</select>
</div>
</div>
`
})

}

function options(selected){
let html=""
for(let h=6;h<=22;h++){
let hh=String(h).padStart(2,"0")
let val=hh+":00"
html+=`<option value="${val}" ${val===selected?"selected":""}>${val}</option>`
}
return html
}

function toggleClosed(btn){
btn.classList.toggle("off")
btn.innerText=btn.classList.contains("off")?"Ouvert":"Fermé"
}

async function save(){

let newData={}

let existingDoc = await db.collection("horaires").doc(paddock).get()
let existing = existingDoc.exists ? existingDoc.data() : {}

newData.durations = existing.durations || [60]

document.querySelectorAll(".dayRow").forEach((row,i)=>{

let day=daysList[i]

newData[day]={
open:row.querySelector(".open").value,
close:row.querySelector(".close").value,
closed:!row.querySelector(".closed").classList.contains("off")
}

})

await db.collection("horaires").doc(paddock).set(newData)

toast("Horaires sauvegardés ✔")

buildHoraires(newData)
}

/* UTILS */

function format(d){
return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())
}

function getDayName(date){
const d=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"]
return d[new Date(date).getDay()]
}

function pad(n){
return String(n).padStart(2,"0")
}

/* FIREBASE */

db.collection("reservations").onSnapshot(s=>{
reservations=[]
s.forEach(d=>{
let r=d.data()
r.id=d.id
reservations.push(r)
})
render()
})

db.collection("horaires").onSnapshot(s=>{
horaires={}
s.forEach(d=>horaires[d.id]=d.data())
render()
})

/* INIT */

buildDays()

</script>

</body>
</html>
