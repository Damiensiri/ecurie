<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paddock Control</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0f1115;
color:white;
}

/* HEADER */

header{
background:#181E3B;
padding:15px;
font-weight:700;
text-align:center;
}

/* DAYS */

.days{
display:flex;
gap:8px;
padding:10px;
}

.day{
flex:1;
background:#1c1f26;
padding:10px;
border-radius:10px;
text-align:center;
}

.day.active{
background:#2ecc71;
color:black;
}

/* GRID */

.grid{
padding:10px;
display:flex;
flex-direction:column;
gap:10px;
}

/* ROW */

.row{
display:flex;
align-items:center;
gap:8px;
}

.time{
width:60px;
font-size:12px;
color:#aaa;
}

/* SLOT */

.slot{
flex:1;
padding:10px;
border-radius:10px;
text-align:center;
font-weight:600;
}

.free{background:#1f8f5f;}
.resa{background:#c0392b;}
.closed{background:#555;color:#bbb;}

.slot:active{
transform:scale(0.96);
}

/* ACTION BAR */

.actionBar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#181E3B;
padding:10px;
display:flex;
gap:10px;
}

.actionBar input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
}

.actionBar button{
padding:10px;
border:none;
border-radius:8px;
background:#2ecc71;
font-weight:600;
}

/* TOAST */

#toast{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
background:#181E3B;
padding:10px 15px;
border-radius:10px;
opacity:0;
transition:0.3s;
}

#toast.show{opacity:1;}

</style>
</head>

<body>

<header>🐎 Paddock Control</header>

<div class="days" id="days"></div>

<div class="grid" id="grid"></div>

<div class="actionBar">
<input id="clientName" placeholder="Nom client">
<button onclick="confirmBooking()">Réserver</button>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE */

firebase.initializeApp({
apiKey:"AIza...",
projectId:"ecurie-paddock"
})

const db=firebase.firestore()

let reservations=[]
let horaires={}
let selectedDate=""
let selectedSlot=null

const paddocks=["maison","grande","beudot"]

/* TOAST */

function toast(msg){
let t=document.getElementById("toast")
t.innerText=msg
t.classList.add("show")
setTimeout(()=>t.classList.remove("show"),2000)
}

/* DATE */

function buildDays(){

for(let i=0;i<3;i++){

let d=new Date()
d.setDate(d.getDate()+i)

let el=document.createElement("div")
el.className="day"
el.innerText=i===0?"Aujourd’hui":i===1?"Demain":"Après"

let date=format(d)

el.onclick=()=>{
selectedDate=date
document.querySelectorAll(".day").forEach(x=>x.classList.remove("active"))
el.classList.add("active")
render()
}

document.getElementById("days").appendChild(el)

if(i===0){
selectedDate=date
el.classList.add("active")
}

}

}

/* RENDER */

function render(){

let grid=document.getElementById("grid")
grid.innerHTML=""

let day=getDayName(selectedDate)

for(let h=6;h<=22;h++){

let time=pad(h)+":00"

let row=document.createElement("div")
row.className="row"

row.innerHTML=`<div class="time">${time}</div>`

paddocks.forEach(p=>{

let config=horaires[p]?.[day]

let cell=document.createElement("div")
cell.className="slot"

if(!config || config.closed){

cell.classList.add("closed")
cell.innerText="Fermé"

}else{

let resa=reservations.find(r=>r.date===selectedDate && r.paddock===p && normalize(r.time)===time)

if(resa){

cell.classList.add("resa")
cell.innerText=resa.name
cell.onclick=()=>cancel(resa.id)

}else{

cell.classList.add("free")
cell.innerText="+"
cell.onclick=()=>{
selectedSlot={p,time}
toast(p+" "+time)
}

}

}

row.appendChild(cell)

})

grid.appendChild(row)

}

}

/* BOOK */

function confirmBooking(){

if(!selectedSlot) return toast("Choisir un créneau")

let name=document.getElementById("clientName").value.trim()
if(!name) return toast("Nom requis")

db.collection("reservations").add({
name,
paddock:selectedSlot.p,
date:selectedDate,
time:selectedSlot.time,
duration:60
})

document.getElementById("clientName").value=""
selectedSlot=null

toast("Réservé ✔")

}

/* CANCEL */

function cancel(id){

if(!confirm("Annuler ?")) return

db.collection("reservations").doc(id).delete()
toast("Annulé")

}

/* UTILS */

function normalize(t){
let [h,m]=t.split(":").map(Number)
return String(h).padStart(2,"0")+":"+(m||0).toString().padStart(2,"0")
}

function format(d){
return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())
}

function getDayName(date){
const days=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"]
return days[new Date(date).getDay()]
}

function pad(n){
return String(n).padStart(2,"0")
}

/* FIREBASE */

db.collection("reservations").onSnapshot(s=>{
reservations=[]
s.forEach(d=>{
let r=d.data()
r.id=d.id
reservations.push(r)
})
render()
})

db.collection("horaires").onSnapshot(s=>{
horaires={}
s.forEach(d=>{
horaires[d.id]=d.data()
})
render()
})

/* INIT */

buildDays()

</script>

</body>
</html>
