<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paddock Control Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:#0f1115;
color:white;
}

/* HEADER */

header{
background:#181E3B;
padding:15px;
text-align:center;
font-weight:700;
}

/* DAYS */

.days{
display:flex;
gap:8px;
padding:10px;
}

.day{
flex:1;
background:#1c1f26;
padding:10px;
border-radius:10px;
text-align:center;
}

.day.active{
background:#2ecc71;
color:black;
}

/* GRID */

.grid{
padding:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.row{
display:flex;
gap:6px;
}

.time{
width:60px;
font-size:12px;
color:#aaa;
}

.slot{
flex:1;
padding:10px;
border-radius:8px;
text-align:center;
font-weight:600;
}

.free{background:#1f8f5f;}
.resa{background:#c0392b;}
.closed{background:#555;color:#bbb;}

/* ACTION BAR */

.actionBar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#181E3B;
padding:10px;
display:flex;
gap:10px;
}

.actionBar input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
}

.actionBar button{
padding:10px;
border:none;
border-radius:8px;
background:#2ecc71;
}

/* HORAIRES */

.block{
margin:20px 10px 100px;
background:#1c1f26;
padding:15px;
border-radius:15px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:10px;
}

.tab{
background:#181E3B;
padding:8px;
border-radius:8px;
cursor:pointer;
}

.tab.active{
background:#2ecc71;
color:black;
}

.dayRow{
margin-bottom:12px;
border-bottom:1px solid #333;
padding-bottom:10px;
}

.row2{
display:flex;
align-items:center;
gap:8px;
}

select{
background:#252a33;
color:white;
border:none;
padding:6px;
border-radius:6px;
}

.closedBtn{
padding:4px 8px;
border-radius:6px;
cursor:pointer;
}

.closedBtn.open{background:#2ecc71;}
.closedBtn.closed{background:#e74c3c;}

.save{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#2ecc71;
}

/* TOAST */

#toast{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
background:#181E3B;
padding:10px 15px;
border-radius:10px;
opacity:0;
transition:0.3s;
}

#toast.show{opacity:1;}

</style>
</head>

<body>

<header>🐎 Paddock Control</header>

<div class="days" id="days"></div>
<div class="grid" id="grid"></div>

<!-- HORAIRES -->

<div class="block">

<div class="tabs">
<div class="tab active" onclick="switchTab('maison',event)">Maison</div>
<div class="tab" onclick="switchTab('grande',event)">Grande</div>
<div class="tab" onclick="switchTab('beudot',event)">Beudot</div>
</div>

<div id="daysAdmin"></div>

<button class="save" onclick="save()">Sauvegarder</button>

</div>

<div class="actionBar">
<input id="name" placeholder="Nom client">
<button onclick="book()">Réserver</button>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE */

firebase.initializeApp({
apiKey:"AIza...",
projectId:"ecurie-paddock"
})

const db=firebase.firestore()

let reservations=[]
let horaires={}
let selectedDate=""
let selectedSlot=null
let paddockAdmin="maison"

/* TOAST */

function toast(t){
let el=document.getElementById("toast")
el.innerText=t
el.classList.add("show")
setTimeout(()=>el.classList.remove("show"),2000)
}

/* DATE */

function buildDays(){
for(let i=0;i<3;i++){
let d=new Date()
d.setDate(d.getDate()+i)

let el=document.createElement("div")
el.className="day"
el.innerText=i===0?"Aujourd’hui":i===1?"Demain":"Après"

let date=format(d)

el.onclick=()=>{
selectedDate=date
document.querySelectorAll(".day").forEach(x=>x.classList.remove("active"))
el.classList.add("active")
render()
}

document.getElementById("days").appendChild(el)

if(i===0){
selectedDate=date
el.classList.add("active")
}
}
}

/* RENDER */

function render(){

let grid=document.getElementById("grid")
grid.innerHTML=""

let day=getDayName(selectedDate)

for(let h=6;h<=22;h++){

let time=pad(h)+":00"

let row=document.createElement("div")
row.className="row"

row.innerHTML=`<div class="time">${time}</div>`

;["maison","grande","beudot"].forEach(p=>{

let config=horaires[p]?.[day]

let cell=document.createElement("div")
cell.className="slot"

if(!config || config.closed){

cell.classList.add("closed")
cell.innerText="Fermé"

}else{

let resa=reservations.find(r=>r.date===selectedDate && r.paddock===p && normalize(r.time)===time)

if(resa){
cell.classList.add("resa")
cell.innerText=resa.name
cell.onclick=()=>cancel(resa.id)
}else{
cell.classList.add("free")
cell.innerText="+"
cell.onclick=()=>{
selectedSlot={p,time}
toast(p+" "+time)
}
}

}

row.appendChild(cell)

})

grid.appendChild(row)

}

}

/* BOOK */

function book(){

if(!selectedSlot) return toast("Choisir un créneau")

let name=document.getElementById("name").value.trim()
if(!name) return toast("Nom requis")

db.collection("reservations").add({
name,
paddock:selectedSlot.p,
date:selectedDate,
time:selectedSlot.time,
duration:60
})

document.getElementById("name").value=""
selectedSlot=null
toast("Réservé ✔")

}

/* CANCEL */

function cancel(id){
if(!confirm("Annuler ?")) return
db.collection("reservations").doc(id).delete()
toast("Annulé")
}

/* HORAIRES (IDENTIQUE) */

const days=["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"]

function switchTab(p,e){

paddockAdmin=p

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
e.target.classList.add("active")

buildHoraires(horaires[p])
}

function buildHoraires(data){

let container=document.getElementById("daysAdmin")
container.innerHTML=""

days.forEach(day=>{

let d=data[day]

container.innerHTML+=`
<div class="dayRow">
<div>${day}</div>

<div class="row2">
<div class="closedBtn ${d.closed?'closed':'open'}" onclick="toggle(this)">
${d.closed?"Fermé":"Ouvert"}
</div>

<select class="open">${options()}</select>
<select class="close">${options()}</select>

</div>
</div>
`
})

setTimeout(()=>{
document.querySelectorAll(".dayRow").forEach((row,i)=>{
let d=data[days[i]]
row.querySelector(".open").value=d.open
row.querySelector(".close").value=d.close
})
},0)
}

function options(){
let html=""
for(let h=6;h<=22;h++){
let hh=String(h).padStart(2,"0")
html+=`<option value="${hh}:00">${hh}:00</option>`
}
return html
}

function toggle(btn){
btn.classList.toggle("closed")
btn.classList.toggle("open")
btn.innerText=btn.classList.contains("closed")?"Fermé":"Ouvert"
}

function save(){

let data={}

document.querySelectorAll(".dayRow").forEach((row,i)=>{

let day=days[i]

data[day]={
open:row.querySelector(".open").value,
close:row.querySelector(".close").value,
closed:row.querySelector(".closedBtn").classList.contains("closed")
}

})

db.collection("horaires").doc(paddockAdmin).set(data,{merge:true})

toast("Horaires sauvegardés")

}

/* UTILS */

function normalize(t){
let [h,m]=t.split(":").map(Number)
return String(h).padStart(2,"0")+":"+(m||0).toString().padStart(2,"0")
}

function format(d){
return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())
}

function getDayName(date){
const days=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"]
return days[new Date(date).getDay()]
}

function pad(n){
return String(n).padStart(2,"0")
}

/* FIREBASE */

db.collection("reservations").onSnapshot(s=>{
reservations=[]
s.forEach(d=>{
let r=d.data()
r.id=d.id
reservations.push(r)
})
render()
})

db.collection("horaires").onSnapshot(s=>{
horaires={}
s.forEach(d=>{
horaires[d.id]=d.data()
})
render()
switchTab(paddockAdmin,{target:document.querySelector(".tab.active")})
})

/* INIT */

buildDays()

</script>

</body>
</html>
