<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Backstage Écurie</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1115;
color:white;
}

header{
background:#181E3B;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
font-size:18px;
}

.icons{
display:flex;
gap:10px;
}

.icons button{
font-size:18px;
padding:8px 12px;
}

.container{
padding:15px;
}

.card{
background:#1c1f26;
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:10px;
}

.tabs button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#181E3B;
color:white;
cursor:pointer;
}

.tabs button.active{
background:#2ecc71;
color:black;
}

table{
width:100%;
border-collapse:collapse;
text-align:center;
}

td,th{
border:1px solid #333;
padding:6px;
}

.free{
background:#2ecc71;
}

.resa{
background:#e74c3c;
cursor:pointer;
}

</style>
</head>

<body>

<header>

<h1>🐎 Backstage</h1>

<div class="icons">

<button onclick="enableNotif()">🔔</button>

<button onclick="location.href='horaires.html'">
⚙️ Configuration
</button>

</div>

</header>


<div class="container">

<div class="card">

<div class="tabs">

<button id="btn0" onclick="loadDay(0)">Aujourd'hui</button>
<button id="btn1" onclick="loadDay(1)">Demain</button>
<button id="btn2" onclick="loadDay(2)">Après-demain</button>

</div>

<table id="planning"></table>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* PASSWORD */

const PASS="0359140"

if(!localStorage.getItem("backstage_auth")){

let p=prompt("Mot de passe")

if(p!==PASS){

document.body.innerHTML="Accès refusé"
throw "stop"

}

localStorage.setItem("backstage_auth",true)

}

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyBn6Hgu-xvsWqpwJ-i4lZyI0QjKMBvOeXA",
authDomain:"ecurie-paddock.firebaseapp.com",
projectId:"ecurie-paddock",
storageBucket:"ecurie-paddock.firebasestorage.app",
messagingSenderId:"501153278739",
appId:"1:501153278739:web:824b4344c381f2a94548e6"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

let reservations=[]
let currentDate=""

/* NOTIFICATIONS */

function enableNotif(){

Notification.requestPermission().then(p=>{

if(p==="granted"){

new Notification("Notifications activées")

}

})

}

/* DATE */

function dateOffset(days){

let d=new Date()
d.setDate(d.getDate()+days)

return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")

}

/* LOAD DAY */

function loadDay(offset){

currentDate=dateOffset(offset)

document.querySelectorAll(".tabs button").forEach(b=>{
b.classList.remove("active")
})

document.getElementById("btn"+offset).classList.add("active")

buildPlanning()

}

/* BUILD PLANNING */

function buildPlanning(){

let paddocks=["maison","grande","beudot"]

let slots=[]

for(let h=8;h<=18;h++){

slots.push(String(h).padStart(2,"0")+":00")
slots.push(String(h).padStart(2,"0")+":30")

}

let html="<tr><th>Heure</th>"

paddocks.forEach(p=>{

html+="<th>"+p+"</th>"

})

html+="</tr>"

slots.forEach(time=>{

html+="<tr>"

html+="<td>"+time+"</td>"

paddocks.forEach(p=>{

let resa=reservations.find(r=>{

let start=r.time
let duration=r.duration/60

let [rh,rm]=start.split(":").map(Number)

let startFloat=rh+(rm/60)

let [th,tm]=time.split(":").map(Number)

let slotFloat=th+(tm/60)

return r.date===currentDate
&& r.paddock===p
&& slotFloat>=startFloat
&& slotFloat<startFloat+duration

})

if(resa){

html+=`
<td class="resa" onclick="cancel('${resa.id}')">
${resa.name}
</td>
`

}else{

html+=`<td class="free"></td>`

}

})

html+="</tr>"

})

document.getElementById("planning").innerHTML=html

}

/* FIREBASE LISTENER */

db.collection("reservations")
.onSnapshot(snapshot=>{

reservations=[]

snapshot.forEach(doc=>{

let r=doc.data()
r.id=doc.id

reservations.push(r)

})

buildPlanning()

})

/* ANNULATION */

async function cancel(id){

if(!confirm("Annuler cette réservation ?")) return

await db.collection("reservations").doc(id).delete()

}

/* NOTIF NOUVELLE RESA */

db.collection("reservations")
.onSnapshot(snapshot=>{

snapshot.docChanges().forEach(change=>{

if(change.type==="added"){

let r=change.doc.data()

if(Notification.permission==="granted"){

new Notification("Nouvelle réservation paddock",{
body:r.name+" — "+r.paddock+" "+r.time
})

}

}

})

})

/* REFRESH AUTO */

setInterval(buildPlanning,30000)

/* INIT */

loadDay(0)

</script>

</body>
</html>
