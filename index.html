<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Backstage Écurie</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1115;
color:white;
}

header{
background:#181E3B;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{margin:0;font-size:18px;}

.icons{display:flex;gap:10px;}

.icons button{
font-size:18px;
padding:8px 12px;
border:none;
border-radius:8px;
background:#1c1f26;
color:white;
cursor:pointer;
}

.container{padding:15px;}

.card{
background:#1c1f26;
border-radius:15px;
padding:15px;
}

.tabs{display:flex;gap:10px;margin-bottom:10px;}

.tabs button{
padding:8px 12px;
border:none;
border-radius:8px;
background:#181E3B;
color:white;
cursor:pointer;
}

.tabs button.active{
background:#2ecc71;
color:black;
}

table{
width:100%;
border-collapse:collapse;
text-align:center;
}

td,th{
border:1px solid #333;
padding:6px;
}

.free{background:#2ecc71;}
.resa{background:#e74c3c;cursor:pointer;}
.closed{background:#555;}

.now td{
border-top:3px solid #f1c40f;
}

</style>
</head>

<body>

<header>

<h1>🐎 Backstage</h1>

<div class="icons">
<button onclick="enableNotif()">🔔</button>
<button onclick="gotoHoraires()">⚙️</button>
</div>

</header>

<div class="container">

<div class="card">

<div class="tabs">
<button id="btn0" onclick="loadDay(0)">Aujourd'hui</button>
<button id="btn1" onclick="loadDay(1)">Demain</button>
<button id="btn2" onclick="loadDay(2)">Après-demain</button>
</div>

<table id="planning"></table>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* PASSWORD */

const PASS="0359140"

if(!localStorage.getItem("backstage_auth")){

let p=prompt("Mot de passe")

if(p!==PASS){
document.body.innerHTML="Accès refusé"
throw "stop"
}

localStorage.setItem("backstage_auth",true)

}

/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyBn6Hgu-xvsWqpwJ-i4lZyI0QjKMBvOeXA",
authDomain:"ecurie-paddock.firebaseapp.com",
projectId:"ecurie-paddock",
storageBucket:"ecurie-paddock.firebasestorage.app",
messagingSenderId:"501153278739",
appId:"1:501153278739:web:824b4344c381f2a94548e6"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

let reservations=[]
let horaires={}
let currentDate=""

let notifEnabled=false
let knownReservations=new Set()

/* NOTIFICATIONS */

function enableNotif(){

Notification.requestPermission().then(permission=>{

if(permission==="granted"){

notifEnabled=true
new Notification("Notifications activées")

}

})

}

/* NAVIGATION */

function gotoHoraires(){
location.href="horaires.html"
}

/* DATE */

function dateOffset(days){

let d=new Date()
d.setDate(d.getDate()+days)

return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")

}

/* LOAD DAY */

function loadDay(offset){

currentDate=dateOffset(offset)

document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"))

document.getElementById("btn"+offset).classList.add("active")

buildPlanning()

}

/* BUILD PLANNING */

function buildPlanning(){

if(!horaires.maison) return

const paddocks=["maison","grande","beudot"]

let skip={maison:0,grande:0,beudot:0}

const parts=currentDate.split("-")
const d=new Date(parts[0],parts[1]-1,parts[2])

const names=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"]

let jour=names[d.getDay()]

let slots=[]

paddocks.forEach(paddock=>{

if(!horaires[paddock] || !horaires[paddock][jour]) return

const config=horaires[paddock][jour]

if(config.closed) return

let start=parseInt(config.open.split(":")[0])
let end=parseInt(config.close.split(":")[0])

let current=start

while(current < end){

let hour=Math.floor(current)
let minutes=current%1===0 ? "00":"30"

let time=String(hour).padStart(2,"0")+":"+minutes

slots.push(time)

let reservation=reservations.find(r=>{

if(r.date!==currentDate) return false
if(r.paddock!==paddock) return false

let [rh,rm]=r.time.split(":").map(Number)
let resStart=rh+(rm/60)

return resStart===current

})

if(reservation){
current += reservation.duration/60
}else{
current += 1
}

}

})

slots=[...new Set(slots)]

slots.sort((a,b)=>{

let [ah,am]=a.split(":").map(Number)
let [bh,bm]=b.split(":").map(Number)

return (ah*60+am)-(bh*60+bm)

})

let html="<tr><th>Heure</th>"

paddocks.forEach(p=>html+="<th>"+p+"</th>")

html+="</tr>"

const now=new Date()
const today=now.toISOString().split("T")[0]
const currentFloat=now.getHours()+now.getMinutes()/60

slots.forEach(time=>{

let [th,tm]=time.split(":").map(Number)
let slotFloat=th+(tm/60)

let isNow=(currentDate===today && slotFloat<=currentFloat && slotFloat+1>currentFloat)

html+=`<tr class="${isNow?"now":""}">`

html+="<td>"+time+"</td>"

paddocks.forEach(p=>{

let resa=reservations.find(r=>r.date===currentDate && r.paddock===p && r.time===time)

if(resa){

let span=resa.duration===90?2:1
skip[p]=span-1

html+=`<td class="resa" rowspan="${span}" onclick="cancel('${resa.id}')">${resa.name}</td>`

}else{

if(skip[p]>0){
skip[p]--
return
}

html+=`<td class="free"></td>`

}

})

html+="</tr>"

})

document.getElementById("planning").innerHTML=html

}

/* RESERVATIONS + NOTIF */

db.collection("reservations").onSnapshot(snapshot=>{

snapshot.forEach(doc=>{

let r=doc.data()
r.id=doc.id

if(notifEnabled && !knownReservations.has(r.id)){

knownReservations.add(r.id)

if(Notification.permission==="granted"){

new Notification("🐎 Nouvelle réservation paddock",{
body:r.name+" — "+r.paddock+" "+r.time
})

}

}

})

reservations=[]

snapshot.forEach(doc=>{

let r=doc.data()
r.id=doc.id
reservations.push(r)

})

buildPlanning()

})

/* HORAIRES */

db.collection("horaires").get().then(snapshot=>{

snapshot.forEach(doc=>{
horaires[doc.id]=doc.data()
})

buildPlanning()

})

/* REFRESH LIGNE JAUNE */

setInterval(buildPlanning,60000)

/* ANNULATION */

async function cancel(id){

if(!confirm("Annuler cette réservation ?")) return

await db.collection("reservations").doc(id).delete()

}

/* INIT */

loadDay(0)

</script>

</body>
</html>
