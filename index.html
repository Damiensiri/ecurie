<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Backstage Écurie</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1115;
color:white;
}

header{
background:#181E3B;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:15px;
}

.card{
background:#1c1f26;
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
background:#181E3B;
color:white;
font-weight:bold;
cursor:pointer;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
text-align:center;
}

td,th{
border:1px solid #333;
padding:8px;
}

.free{
background:#2ecc71;
}

.resa{
background:#e74c3c;
cursor:pointer;
}

</style>
</head>

<body>

<header>
🐎 Écurie du Grand Rang — Backstage
</header>

<div class="container">

<div class="card">

<button onclick="enableNotif()">
🔔 Activer les notifications
</button>

</div>

<div class="card">

<h3>Planning paddocks</h3>

<div class="tabs">

<button onclick="loadDay(0)">Aujourd'hui</button>
<button onclick="loadDay(1)">Demain</button>
<button onclick="loadDay(2)">Après-demain</button>

</div>

<table id="planning"></table>

</div>

<div class="card">

<h3>Configuration</h3>

<button onclick="location.href='horaires.html'">
⚙️ Configurer les horaires
</button>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* ---------------- MOT DE PASSE ---------------- */

const PASS="0359140"

if(!localStorage.getItem("backstage_auth")){

let p=prompt("Mot de passe")

if(p!==PASS){

document.body.innerHTML="Accès refusé"
throw "stop"

}else{

localStorage.setItem("backstage_auth",true)

}

}

/* ---------------- FIREBASE ---------------- */

const firebaseConfig={
apiKey:"AIzaSyBn6Hgu-xvsWqpwJ-i4lZyI0QjKMBvOeXA",
authDomain:"ecurie-paddock.firebaseapp.com",
projectId:"ecurie-paddock",
storageBucket:"ecurie-paddock.firebasestorage.app",
messagingSenderId:"501153278739",
appId:"1:501153278739:web:824b4344c381f2a94548e6"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

let reservations=[]
let currentDate=""

/* ---------------- NOTIFICATIONS ---------------- */

function enableNotif(){

Notification.requestPermission().then(permission=>{

if(permission==="granted"){

alert("Notifications activées")

new Notification("Notifications paddock activées")

}else{

alert("Notifications refusées")

}

})

}

/* ---------------- DATE ---------------- */

function dateOffset(days){

let d=new Date()

d.setDate(d.getDate()+days)

return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")

}

/* ---------------- LOAD DAY ---------------- */

function loadDay(offset){

currentDate=dateOffset(offset)

buildPlanning()

}

/* ---------------- PLANNING ---------------- */

function buildPlanning(){

let paddocks=["maison","grande","beudot"]

let hours=[
"08:00","09:00","10:00","11:00",
"12:00","13:00","14:00","15:00",
"16:00","17:00","18:00"
]

let html="<tr><th>Heure</th>"

paddocks.forEach(p=>{
html+="<th>"+p+"</th>"
})

html+="</tr>"

hours.forEach(h=>{

html+="<tr>"

html+="<td>"+h+"</td>"

paddocks.forEach(p=>{

let resa=reservations.find(r=>{

return r.date===currentDate && r.paddock===p && r.time===h

})

if(resa){

html+=`
<td class="resa" onclick="cancel('${resa.id}')">
${resa.name}
</td>
`

}else{

html+=`<td class="free">Libre</td>`

}

})

html+="</tr>"

})

document.getElementById("planning").innerHTML=html

}

/* ---------------- FIREBASE LISTEN ---------------- */

db.collection("reservations")
.onSnapshot(snapshot=>{

reservations=[]

snapshot.forEach(doc=>{

let r=doc.data()
r.id=doc.id

reservations.push(r)

})

buildPlanning()

})

/* ---------------- ANNULATION ---------------- */

async function cancel(id){

if(!confirm("Annuler cette réservation ?")) return

await db.collection("reservations").doc(id).delete()

}

/* ---------------- NOTIF NOUVELLE RESA ---------------- */

db.collection("reservations")
.onSnapshot(snapshot=>{

snapshot.docChanges().forEach(change=>{

if(change.type==="added"){

let r=change.doc.data()

if(Notification.permission==="granted"){

new Notification("Nouvelle réservation paddock",{
body:r.name+" — "+r.paddock+" "+r.time
})

}

}

})

})

/* ---------------- INIT ---------------- */

loadDay(0)

</script>

</body>
</html>
