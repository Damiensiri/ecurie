<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Backstage Écurie</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1115;
color:white;
}

header{
background:#181E3B;
padding:15px;
text-align:center;
font-weight:bold;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:#1c1f26;
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #333;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#181E3B;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
🐎 Écurie du Grand Rang — Backstage
</header>

<div class="container">

<div class="card">

<button onclick="enableNotif()">
🔔 Activer les notifications
</button>

</div>

<div class="card">

<h3>Réservations aujourd'hui</h3>

<div id="today"></div>

</div>

<div class="card">

<h3>Planning paddocks</h3>

<div id="planning"></div>

</div>

<div class="card">

<h3>Configuration</h3>

<button onclick="location.href='horaires.html'">
⚙️ Configurer les horaires
</button>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

/* ---------------- MOT DE PASSE ---------------- */

const PASS="0359140"

if(!localStorage.getItem("backstage_auth")){

let p=prompt("Mot de passe")

if(p!==PASS){

document.body.innerHTML="Accès refusé"
throw "stop"

}else{

localStorage.setItem("backstage_auth",true)

}

}

/* ---------------- FIREBASE ---------------- */

const firebaseConfig={
apiKey:"AIzaSyBn6Hgu-xvsWqpwJ-i4lZyI0QjKMBvOeXA",
authDomain:"ecurie-paddock.firebaseapp.com",
projectId:"ecurie-paddock",
storageBucket:"ecurie-paddock.firebasestorage.app",
messagingSenderId:"501153278739",
appId:"1:501153278739:web:824b4344c381f2a94548e6"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

/* ---------------- NOTIFICATIONS ---------------- */

function enableNotif(){

if(!("Notification" in window)){
alert("Notifications non supportées")
return
}

Notification.requestPermission().then(permission => {

if(permission==="granted"){

alert("Notifications activées")

new Notification("Notifications paddock activées")

}else{

alert("Notifications refusées")

}

})

}

/* ---------------- DATE AUJOURD'HUI ---------------- */

function todayString(){

let d=new Date()

return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")

}

/* ---------------- LOAD RESERVATIONS ---------------- */

db.collection("reservations")
.onSnapshot(snapshot=>{

let today=todayString()

let html=""
let planning={maison:[],grande:[],beudot:[]}

snapshot.forEach(doc=>{

let r=doc.data()

if(r.date===today){

html+=`
<div class="row">
<div>${r.time} — ${r.name}</div>
<div>${r.paddock}</div>
</div>
`

planning[r.paddock].push(r.time)

}

})

document.getElementById("today").innerHTML=html

/* planning */

let phtml=""

for(let p in planning){

phtml+=`<b>${p}</b><br>`

if(planning[p].length===0){

phtml+="Libre<br><br>"

}else{

planning[p].forEach(t=>{

phtml+=t+"<br>"

})

phtml+="<br>"

}

}

document.getElementById("planning").innerHTML=phtml

})

/* ---------------- NOTIF NOUVELLE RESA ---------------- */

db.collection("reservations")
.onSnapshot(snapshot=>{

snapshot.docChanges().forEach(change=>{

if(change.type==="added"){

let r=change.doc.data()

if(Notification.permission==="granted"){

new Notification("Nouvelle réservation paddock",{

body:r.name+" — "+r.paddock+" "+r.time

})

}

}

})

})

</script>

</body>
</html>
