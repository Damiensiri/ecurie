<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#090b0f">
  <link rel="manifest" href="manifest.webmanifest">
  <title>Utilisateurs — Backstage production</title>
  <link rel="stylesheet" href="assets/css/backstage-shell.css?v=20260716-2">
  <link rel="stylesheet" href="assets/css/users.css?v=20260716-2">
</head>
<body class="users-page">
  <main class="users-shell">
    <header class="users-header"><span class="beta-pill">PRODUCTION · D1</span><h1>Utilisateurs</h1>
      <p>Les comptes créés ici sont isolés dans Cloudflare/D1 production.</p></header>
    <p id="connectionStatus" class="status" role="status"></p>
    <section class="users-panel create-panel" aria-labelledby="createTitle">
      <button id="createPanelToggle" class="create-panel-toggle" type="button" aria-expanded="false" aria-controls="createPanelBody">
        <span id="createTitle">Créer un compte</span><span class="create-panel-arrow" aria-hidden="true">⌄</span>
      </button>
      <div id="createPanelBody" class="create-panel-body" aria-hidden="true"><div class="create-panel-inner">
      <form id="userForm"><div class="field-grid">
        <label>Prénom<input id="firstName" maxlength="60" autocomplete="given-name" required></label>
        <label>Nom<input id="lastName" maxlength="80" autocomplete="family-name" required></label>
        <label>Adresse email<input id="email" type="email" maxlength="160" autocomplete="email" required></label>
        <label>Rôle<select id="role"><option value="client">Client</option><option value="staff">Équipe</option><option value="admin">Administrateur</option></select></label>
        <label>Mot de passe temporaire<input id="temporaryPassword" type="password" minlength="12" maxlength="200" autocomplete="new-password" required></label>
      </div><p class="help">12 caractères minimum. L’utilisateur devra le remplacer à sa première connexion.</p>
      <button type="submit">Créer le compte production</button><p id="createStatus" class="status" role="status"></p></form>
      </div></div>
    </section>
    <section class="users-panel"><div class="panel-heading"><h2>Comptes production</h2><button id="refreshBtn" class="secondary" type="button">Actualiser</button></div>
      <label class="users-search"><span>Rechercher un compte</span><input id="usersSearch" type="search" autocomplete="off" placeholder="Nom, prénom ou adresse email…"></label>
      <div id="usersList" class="users-list"><p class="empty">Chargement…</p></div></section>
  </main>
  <div id="userDetailsModal" class="user-modal" hidden>
    <div class="user-modal-sheet" role="dialog" aria-modal="true" aria-labelledby="userDetailsTitle">
      <div class="panel-heading"><h2 id="userDetailsTitle">Détails utilisateur</h2><button id="closeUserDetails" class="secondary" type="button">Fermer</button></div>
      <div id="userDetailsBody"></div>
    </div>
  </div>
  <script src="assets/js/users.js?v=20260717-1"></script>
  <script src="assets/js/backstage-shell.js?v=20260716-2"></script>
</body>
</html>
